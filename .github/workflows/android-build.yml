name: Build Android APK

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install npm dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Install expo-localization (if not in package.json)
        working-directory: ./frontend
        run: npm install expo-localization --legacy-peer-deps

      - name: Create environment file
        working-directory: ./frontend
        run: |
          cat > .env << 'EOF'
          EXPO_PUBLIC_API_URL=http://66.42.113.157:8000/api/v1
          EXPO_PUBLIC_WEBSOCKET_URL=ws://66.42.113.157:8000/ws
          EOF

      - name: Make gradlew executable
        run: chmod +x ./frontend/android/gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('frontend/android/**/*.gradle*', 'frontend/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Android APK (Debug)
        working-directory: ./frontend/android
        run: |
          ./gradlew assembleDebug \
            --stacktrace \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx3072m -XX:MaxMetaspaceSize=512m"

      - name: Verify APK was created
        run: |
          APK_PATH="frontend/android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "APK successfully created!"
            ls -lh "$APK_PATH"
          else
            echo "APK not found. Searching..."
            find frontend/android -name "*.apk" -type f 2>/dev/null || echo "No APK found anywhere"
            exit 1
          fi

      - name: Upload APK to artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: AbuAlzahra-VoIP-v${{ github.run_number }}
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload build logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            frontend/android/app/build/reports/
            frontend/android/build/reports/
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && success()
        uses: softprops/action-gh-release@v1
        with:
          files: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          name: Abu Alzahra VoIP ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Status Report
        if: always()
        run: |
          echo "=============================="
          echo "   Android Build Status"
          echo "=============================="
          if [ "${{ job.status }}" = "success" ]; then
            echo "STATUS: BUILD SUCCESSFUL"
            echo "APK available in the Actions artifacts tab"
          else
            echo "STATUS: BUILD FAILED"
            echo "Check the logs above for details"
          fi
          echo ""
          echo "Build Info:"
          echo "- Node.js: 18.x"
          echo "- Java: 17 (Temurin)"
          echo "- Gradle: 7.6.3"
          echo "- AGP: 7.3.1"
          echo "- Backend: http://66.42.113.157:8000"
          echo "- App: Abu Alzahra VoIP"
          echo "- Package: com.abualzahra.voip"
          echo "=============================="
